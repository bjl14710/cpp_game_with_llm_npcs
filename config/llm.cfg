# Centralized LLM settings shared by every NPC.
# Edit and re-run the game; no rebuild needed.

host = localhost
port = 11434

# Any Ollama tag works. Pull it first with: ollama pull <model>
model = qwen2.5:3b-instruct

# 0.0 = deterministic. 0.7-0.9 = natural chat. 1.0+ = chaotic.
temperature = 0.8

# How long to wait for a single reply before giving up.
request_timeout_s = 60
